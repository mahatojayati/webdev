<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar Variations</title>
  <link rel="stylesheet" href="navbar1_style.css">
<style>
 body{
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  background-color: papayawhip;

  .nav-container
  {
    margin-bottom:20px;
  }
  .h2{
    margin-bottom: 40px;
    color: black;
  }
  .navbar1 ul{
    list-style-type: none;
    margin: 0;
    padding: 10px 3px;
    display: flex;
    justify-content: space-around;
    background-color: lemonchiffon;
  }
  
  .navbar1{
    border: 2px solid black;
    border-radius: 2px;
    padding: 10px;
    background-color: lemonchiffon;
    /* background-color: violet; */
  }
  .navbar1 li {
    display: inline-block;
    background-color: white;

  }
  .navbar1 a {
    text-decoration: none;
    padding: 5px 10px;
    /* background-color: moccasin; */
    color: lightcoral;
    position: relative;
  }

  .navbar1 a::after{
    content: '';
    position: absolute;
    left: 0;
    bottom: 0;
    width: 0;
    height: 2px;
    background-color: lightcoral;
    transform: scaleX(0);
    transition: transform 0.3s ease;

  }
  .navbar1 a:hover::after {
    width: 100%;
    transform: scaleX(1);

    
  }
  .navbar1 a::after {
    /* content: 'grrrrh'; */
    display: absolute;
  }
  .navbar1 .loginbutton{
    background-color: moccasin;
    /* border: 5px solid black; */
    border-radius: 5px;
    color: lightcoral;
    cursor: pointer;
  }
}
</style>
</head>
<body>
  <div class = "nav-container">
    <h2>Variation: Horizontal with underline effect</h2>
    <nav class="navbar1">
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
        <li><button class = "loginbutton">Login</button></li>
      </ul>
    </nav>
  </div>
</body>
</html>
